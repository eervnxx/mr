<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المنطقة المحظورة | Dark Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* منع تحديد النص */
        }

        body {
            font-family: 'Courier New', 'Courier', 'Monaco', monospace;
            background: #000000;
            overflow-x: hidden;
        }

        /* صفحة تسجيل الدخول المخيفة جداً */
        .login-container {
            min-height: 100vh;
            background: #030303;
            background-image: 
                repeating-linear-gradient(0deg, rgba(0,255,0,0.03) 0px, rgba(0,255,0,0.03) 1px, transparent 1px, transparent 4px),
                repeating-linear-gradient(90deg, rgba(255,0,0,0.02) 0px, rgba(255,0,0,0.02) 2px, transparent 2px, transparent 8px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* نصوص متلاشية مخيفة */
        .glitch-text {
            position: absolute;
            top: 20%;
            left: 10%;
            font-size: 1.2rem;
            color: #2a2a2a;
            text-shadow: 0 0 3px red;
            animation: flicker 3s infinite;
            font-weight: bold;
            letter-spacing: 2px;
        }

        @keyframes flicker {
            0% { opacity: 0.2; text-shadow: 0 0 1px red; }
            50% { opacity: 0.6; text-shadow: 0 0 5px #ff0000; }
            100% { opacity: 0.2; text-shadow: 0 0 1px #330000; }
        }

        /* خط المسح المخيف */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(255,0,0,0.6);
            animation: scan 8s linear infinite;
            z-index: 2;
            box-shadow: 0 0 10px red;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* البطاقة المظلمة */
        .login-card {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid #4a0000;
            border-radius: 32px;
            padding: 2.5rem 2rem;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 0 40px rgba(255,0,0,0.2), inset 0 0 20px rgba(139,0,0,0.3);
            text-align: center;
            transition: all 0.4s;
            z-index: 10;
        }

        .login-card h1 {
            font-size: 2rem;
            color: #9e2a2a;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 6px red;
        }

        .sub {
            color: #5e3a3a;
            font-size: 0.7rem;
            border-bottom: 1px dashed #5a1e1e;
            display: inline-block;
            margin-bottom: 2rem;
            letter-spacing: 3px;
        }

        /* تنسيق الحقول - بدون أي تلميح (بدون placeholder واضح) */
        .date-fields {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .date-field {
            flex: 1;
            min-width: 80px;
        }

        /* التسميات غامضة وغير واضحة المعنى */
        .date-field label {
            display: block;
            color: #4a1a1a;
            font-size: 0.65rem;
            letter-spacing: 2px;
            margin-bottom: 6px;
            text-transform: uppercase;
            opacity: 0.7;
            font-weight: bold;
        }

        .secret-input {
            background: #0a0a0a;
            border: 1px solid #4a0000;
            padding: 12px 10px;
            width: 100%;
            font-size: 1.1rem;
            font-family: monospace;
            color: #b30000;
            text-align: center;
            letter-spacing: 2px;
            border-radius: 12px;
            outline: none;
            transition: 0.2s;
            font-weight: bold;
        }

        /* إزالة أي placeholder نهائياً */
        .secret-input::placeholder {
            color: transparent;
        }

        .secret-input:focus {
            border-color: #ff3b3b;
            box-shadow: 0 0 15px #ff0000;
            background: #110000;
        }

        .join-btn {
            background: #2c0000;
            border: 1px solid #a10000;
            padding: 12px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff7b7b;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            font-family: monospace;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .join-btn:hover {
            background: #4f0000;
            box-shadow: 0 0 15px crimson;
            color: white;
            transform: scale(0.98);
            border-color: red;
        }

        .error-msg {
            color: #ff3a3a;
            background: #1f0000;
            padding: 8px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-top: 15px;
            border: 1px solid #a00;
            display: inline-block;
        }

        /* الواجهة الثانية */
        .main-interface {
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #0c0b0b, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-y: auto;
            padding: 2rem 1rem;
        }

        .question-panel {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid #b5006b;
            max-width: 650px;
            width: 100%;
            padding: 2rem 1.8rem;
            box-shadow: 0 0 60px rgba(255, 20, 147, 0.4);
        }

        .question-item {
            background: #150b0e;
            margin: 25px 0;
            padding: 1rem 1.5rem;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            border-left: 8px solid #ff66c0;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: bold;
            color: #ffb3d9;
            font-family: monospace;
            text-shadow: 0 0 3px #ff44aa;
        }

        .agree-btn {
            background: #2e0422;
            border: 1px solid #ff44aa;
            padding: 8px 28px;
            border-radius: 40px;
            color: #ffb3d9;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
        }

        .agree-btn.active {
            background: #c71585;
            color: white;
            box-shadow: 0 0 10px hotpink;
            border-color: white;
        }

        .next-btn {
            background: linear-gradient(45deg, #4b006e, #b1006b);
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            border-radius: 50px;
            margin-top: 35px;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
            letter-spacing: 3px;
        }

        .next-btn:disabled {
            background: #2a1a2a;
            color: gray;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .pink-message {
            background: #ffb6c1d9;
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 1.5rem;
            margin: 20px 0;
            text-align: right;
            direction: rtl;
            font-family: 'Segoe UI', 'Tahoma', monospace;
            font-size: 1.3rem;
            font-weight: bold;
            color: #3c0b2e;
            border: 3px solid #ff69b4;
            box-shadow: 0 0 20px #ff85b3;
            letter-spacing: 1px;
        }

        .popup-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff3b6f;
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: bold;
            z-index: 2000;
            box-shadow: 0 0 20px #ff1493;
            font-family: monospace;
            animation: fadeOutUp 3s forwards;
            white-space: nowrap;
        }

        @keyframes fadeOutUp {
            0% { opacity: 1; transform: translateX(-50%) translateY(0);}
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-60px); visibility: hidden; }
        }

        .confetti {
            position: fixed;
            width: 12px;
            height: 12px;
            z-index: 9999;
            pointer-events: none;
        }

        .balloon-pop {
            position: fixed;
            bottom: -50px;
            width: 40px;
            height: 55px;
            background: radial-gradient(circle at 30% 30%, #ff5e9e, #ff2d75);
            border-radius: 50% 50% 50% 50%;
            z-index: 10000;
            cursor: pointer;
            animation: floatUp 6s linear forwards;
            box-shadow: 0 0 10px rgba(255,105,180,0.8);
        }

        .balloon-pop::after {
            content: "🎈";
            position: absolute;
            top: -20px;
            left: 10px;
            font-size: 20px;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-120vh) rotate(360deg);
                opacity: 0;
            }
        }

        .hidden {
            display: none;
        }

        button {
            cursor: pointer;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake-effect {
            animation: shake 0.2s ease-in-out 0s 2;
        }
    </style>
</head>
<body>

<!-- صفحة تسجيل الدخول المخيفة - بدون أي تلميح أو إشارة إلى التاريخ -->
<div id="loginPage" class="login-container">
    <div class="glitch-text">>> SYSTEM LOCKED <<</div>
    <div class="glitch-text" style="top:85%; left:auto; right:8%; font-size:0.8rem;">UNAUTHORIZED ACCESS</div>
    <div class="scan-line"></div>
    <div class="login-card">
        <h1>⚠️ DARK VAULT ⚠️</h1>
        <div class="sub">ACCESS CODE REQUIRED</div>
        
        <!-- 3 حقول غامضة تماماً بدون أي تلميح -->
        <div class="date-fields">
            <div class="date-field">
                <label>[ 0x3A ]</label>
                <input type="text" id="codeField1" class="secret-input" autocomplete="off" maxlength="4">
            </div>
            <div class="date-field">
                <label>[ 0x7F ]</label>
                <input type="text" id="codeField2" class="secret-input" autocomplete="off" maxlength="2">
            </div>
            <div class="date-field">
                <label>[ 0x9E ]</label>
                <input type="text" id="codeField3" class="secret-input" autocomplete="off" maxlength="2">
            </div>
        </div>
        
        <button id="joinBtn" class="join-btn">>> ENTER <<</button>
        <div id="loginError" class="error-msg" style="display: none;">✖ ACCESS DENIED ✖</div>
        <div style="margin-top: 20px; font-size: 9px; color: #2f0f0f;">━━  ENCRYPTED ZONE  ━━</div>
    </div>
</div>

<!-- الواجهة الثانية -->
<div id="secondInterface" class="main-interface hidden">
    <div class="question-panel" id="questionPanel">
        <div class="question-item" id="q1">
            <span class="question-text">❓ هل انت ميار ؟</span>
            <button class="agree-btn" data-question="miar">موافق</button>
        </div>
        <div class="question-item" id="q2">
            <span class="question-text">🏙️ هل انت من بغداد ؟</span>
            <button class="agree-btn" data-question="baghdad">موافق</button>
        </div>
        <button id="finalNextBtn" class="next-btn" disabled>◀ التالي</button>
        <div id="specialMessageContainer" style="margin-top: 20px;"></div>
    </div>
</div>

<script>
    // عناصر DOM
    const loginPage = document.getElementById('loginPage');
    const secondInterface = document.getElementById('secondInterface');
    const codeField1 = document.getElementById('codeField1'); // السنة
    const codeField2 = document.getElementById('codeField2'); // الشهر
    const codeField3 = document.getElementById('codeField3'); // اليوم
    const joinBtn = document.getElementById('joinBtn');
    const loginErrorDiv = document.getElementById('loginError');
    
    // عناصر الأسئلة
    const miarBtn = document.querySelector('[data-question="miar"]');
    const baghdadBtn = document.querySelector('[data-question="baghdad"]');
    const finalNextBtn = document.getElementById('finalNextBtn');
    const specialMsgContainer = document.getElementById('specialMessageContainer');
    
    // حالة الأسئلة
    let isMiarApproved = false;
    let isBaghdadApproved = false;
    let finalCompleted = false;
    
    // السر: التاريخ 2005/1/1 (لا يظهر في أي مكان في الواجهة)
    // هذه القيم مخفية تماماً عن المستخدم، لا يوجد أي تلميح
    function validateSecretCode(code1, code2, code3) {
        // تنظيف المدخلات
        const clean1 = String(code1).trim();
        const clean2 = String(code2).trim();
        const clean3 = String(code3).trim();
        
        // تحويل إلى أرقام
        const val1 = parseInt(clean1, 10);
        const val2 = parseInt(clean2, 10);
        const val3 = parseInt(clean3, 10);
        
        if (isNaN(val1) || isNaN(val2) || isNaN(val3)) return false;
        
        // المفتاح السري: 2005 / 1 / 1
        // لا يتم عرض أي رسالة توحي بذلك في أي مكان
        const isValid = (val1 === 2005 && val2 === 1 && val3 === 1);
        
        // دعم الإدخالات بصيغة 01 أيضاً ولكن الشهر واليوم يجب أن يكونا بقيمة 1
        const isValidWithZero = (val1 === 2005 && (clean2 === "1" || clean2 === "01") && (clean3 === "1" || clean3 === "01"));
        
        return isValid || isValidWithZero;
    }
    
    // دالة لعرض رسائل الخطأ بطريقة مخيفة
    function showError() {
        loginErrorDiv.style.display = "block";
        loginErrorDiv.innerText = "✖ ACCESS DENIED ✖";
        // تأثير اهتزاز للحقول
        const allFields = [codeField1, codeField2, codeField3];
        allFields.forEach(field => {
            field.classList.add('shake-effect');
            setTimeout(() => field.classList.remove('shake-effect'), 500);
        });
        // وميض أحمر
        loginErrorDiv.style.animation = "flicker 0.3s ease";
        setTimeout(() => { loginErrorDiv.style.animation = ""; }, 300);
    }
    
    // دالة لإخفاء الخطأ عند الكتابة
    function clearErrorOnInput() {
        loginErrorDiv.style.display = "none";
    }
    
    // إضافة مستمعين لإخفاء الخطأ عند الكتابة
    [codeField1, codeField2, codeField3].forEach(input => {
        input.addEventListener('input', clearErrorOnInput);
    });
    
    // حدث تسجيل الدخول
    joinBtn.addEventListener('click', () => {
        const code1 = codeField1.value;
        const code2 = codeField2.value;
        const code3 = codeField3.value;
        
        if (validateSecretCode(code1, code2, code3)) {
            // نجاح الدخول - لا يوجد أي تلميح عن التاريخ، فقط الشخص الذي يعرفه سيدخل
            loginPage.style.transition = "opacity 0.8s";
            loginPage.style.opacity = "0";
            setTimeout(() => {
                loginPage.classList.add('hidden');
                secondInterface.classList.remove('hidden');
                resetQuestionsState();
                createPopFloatingEffect(8);
                showToastPopup("🔓 ACCESS GRANTED... ENTER THE VOID 🔓", 2000);
            }, 700);
        } else {
            showError();
            // إفراغ الحقول بعد محاولة فاشلة لزيادة الغموض
            codeField1.value = "";
            codeField2.value = "";
            codeField3.value = "";
        }
    });
    
    // إعادة ضبط حالة الأسئلة
    function resetQuestionsState() {
        isMiarApproved = false;
        isBaghdadApproved = false;
        if (miarBtn) {
            miarBtn.classList.remove('active');
            miarBtn.innerText = "موافق";
            miarBtn.disabled = false;
        }
        if (baghdadBtn) {
            baghdadBtn.classList.remove('active');
            baghdadBtn.innerText = "موافق";
            baghdadBtn.disabled = false;
        }
        if (finalNextBtn) {
            finalNextBtn.disabled = true;
            finalNextBtn.innerText = "◀ التالي";
        }
        specialMsgContainer.innerHTML = '';
        finalCompleted = false;
    }
    
    // دالة لتفعيل موافقة الأسئلة
    function handleAgree(questionType, buttonElement) {
        if (questionType === 'miar') {
            if (!isMiarApproved) {
                isMiarApproved = true;
                buttonElement.classList.add('active');
                buttonElement.innerText = "✓ موافق";
                showToastPopup("✅ تم التأكيد", 1200);
                createPopFloatingEffect(3);
            }
        } else if (questionType === 'baghdad') {
            if (!isBaghdadApproved) {
                isBaghdadApproved = true;
                buttonElement.classList.add('active');
                buttonElement.innerText = "✓ موافق";
                showToastPopup("🌆 تم التأكيد", 1200);
                createPopFloatingEffect(3);
            }
        }
        
        // التحقق من تفعيل زر التالي
        if (isMiarApproved && isBaghdadApproved) {
            finalNextBtn.disabled = false;
            finalNextBtn.style.animation = "pulse 0.6s ease 2";
            setTimeout(() => { finalNextBtn.style.animation = ""; }, 1200);
        } else {
            finalNextBtn.disabled = true;
        }
    }
    
    // إضافة مستمعي الأزرار
    if (miarBtn) {
        miarBtn.addEventListener('click', function(e) {
            if (!isMiarApproved) handleAgree('miar', this);
        });
    }
    if (baghdadBtn) {
        baghdadBtn.addEventListener('click', function(e) {
            if (!isBaghdadApproved) handleAgree('baghdad', this);
        });
    }
    
    // زر التالي: عرض الرسالة الوردية + فرقعة وبالونات
    finalNextBtn.addEventListener('click', () => {
        if (finalCompleted) return;
        if (isMiarApproved && isBaghdadApproved) {
            finalCompleted = true;
            
            // عرض رسالة مميزة بتصميم كتابة من اليمين لليسار
            const msgDiv = document.createElement('div');
            msgDiv.className = 'pink-message';
            msgDiv.style.direction = "rtl";
            msgDiv.style.fontFamily = "'Courier New', 'Fira Code', monospace";
            msgDiv.style.fontSize = "1.25rem";
            msgDiv.style.fontWeight = "bold";
            msgDiv.style.background = "#ffb7c5e6";
            msgDiv.innerHTML = `✨🧠 تم تصميم هذا الموقع خصيصا لك لان اصبحت صديقة ذلك الشخص 🧠✨<br><span style="font-size:0.9rem;">🖥️ Right-to-left style | Hacker's Heart 🖤</span>`;
            specialMsgContainer.innerHTML = '';
            specialMsgContainer.appendChild(msgDiv);
            
            // إظهار نافذة منبثقة وردية
            showToastPopup("💖 رسالة خاصة: أنتِ صديقة ذلك الشخص 💖", 3000);
            
            // إنشاء مؤثر فرقعة كثيف
            createHeavyConfetti(180);
            // إنشاء بالونات تتطاير وتفرقع
            createBalloonsWithPop(22);
            
            // تعطيل أزرار الموافقة بعد اكتمال الحدث
            if(miarBtn) miarBtn.disabled = true;
            if(baghdadBtn) baghdadBtn.disabled = true;
            finalNextBtn.disabled = true;
            finalNextBtn.innerText = "✓ اكتملت الطقوس ✓";
            
            setTimeout(() => {
                showToastPopup("🎉🎈 بالونات تتفرقع في سماء الذكرى 🎈🎉", 3500);
            }, 800);
        }
    });
    
    // إنشاء فرقعة (confetti)
    function createHeavyConfetti(count) {
        for (let i = 0; i < count; i++) {
            const conf = document.createElement('div');
            conf.classList.add('confetti');
            const size = Math.random() * 8 + 4;
            conf.style.width = size + "px";
            conf.style.height = size + "px";
            conf.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 60%)`;
            conf.style.position = "fixed";
            conf.style.top = "0px";
            conf.style.left = Math.random() * window.innerWidth + "px";
            conf.style.zIndex = "10001";
            conf.style.opacity = "0.9";
            conf.style.borderRadius = "50%";
            conf.style.pointerEvents = "none";
            document.body.appendChild(conf);
            const duration = Math.random() * 1.5 + 1;
            const endY = window.innerHeight + 50;
            conf.animate([
                { transform: `translateY(0px) rotate(0deg)`, opacity: 1 },
                { transform: `translateY(${endY}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
            ], { duration: duration * 1000, easing: 'cubic-bezier(0.2, 0.9, 0.4, 1)' });
            setTimeout(() => { if(conf) conf.remove(); }, duration * 1000);
        }
    }
    
    // إنشاء بالونات متحركة
    function createBalloonsWithPop(numBalloons) {
        for (let i = 0; i < numBalloons; i++) {
            setTimeout(() => {
                const balloon = document.createElement('div');
                balloon.classList.add('balloon-pop');
                const leftPos = Math.random() * (window.innerWidth - 70);
                balloon.style.left = leftPos + "px";
                balloon.style.width = "45px";
                balloon.style.height = "60px";
                balloon.style.backgroundColor = `hsl(${Math.random() * 360}, 80%, 65%)`;
                balloon.style.position = "fixed";
                balloon.style.bottom = "-80px";
                balloon.style.borderRadius = "50% 50% 45% 45%";
                balloon.style.zIndex = "10002";
                balloon.style.cursor = "pointer";
                balloon.style.boxShadow = "0 0 12px hotpink";
                document.body.appendChild(balloon);
                const duration = Math.random() * 5 + 4;
                const animation = balloon.animate([
                    { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                    { transform: `translateY(-${window.innerHeight + 200}px) rotate(20deg)`, opacity: 0.7 }
                ], { duration: duration * 1000, easing: 'linear' });
                animation.onfinish = () => {
                    if (balloon && balloon.parentNode) {
                        createPopEffectAt(balloon.getBoundingClientRect().left + 20, balloon.getBoundingClientRect().top + 30);
                        balloon.remove();
                    }
                };
                balloon.addEventListener('click', () => {
                    if (balloon) {
                        createPopEffectAt(balloon.getBoundingClientRect().left + 20, balloon.getBoundingClientRect().top + 30);
                        balloon.remove();
                    }
                });
                setTimeout(() => {
                    if (balloon && balloon.parentNode) {
                        createPopEffectAt(balloon.getBoundingClientRect().left + 20, balloon.getBoundingClientRect().top + 30);
                        balloon.remove();
                    }
                }, duration * 1000);
            }, i * 300);
        }
    }
    
    function createPopEffectAt(x, y) {
        for (let s = 0; s < 12; s++) {
            const particle = document.createElement('div');
            particle.style.position = 'fixed';
            particle.style.width = '6px';
            particle.style.height = '6px';
            particle.style.backgroundColor = `#ff66aa`;
            particle.style.borderRadius = '50%';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.pointerEvents = 'none';
            particle.style.zIndex = '10020';
            document.body.appendChild(particle);
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 100 + 50;
            const vx = Math.cos(angle) * velocity;
            const vy = Math.sin(angle) * velocity;
            let posX = x, posY = y;
            let opacity = 1;
            const step = () => {
                posX += vx * 0.02;
                posY += vy * 0.02;
                opacity -= 0.02;
                particle.style.transform = `translate(${posX - x}px, ${posY - y}px)`;
                particle.style.opacity = opacity;
                if (opacity <= 0) {
                    particle.remove();
                } else {
                    requestAnimationFrame(step);
                }
            };
            requestAnimationFrame(step);
            setTimeout(() => particle.remove(), 800);
        }
    }
    
    function createPopFloatingEffect(count) {
        for (let i=0;i<count;i++) {
            const popDiv = document.createElement('div');
            popDiv.innerText = "💥";
            popDiv.style.position = "fixed";
            popDiv.style.left = Math.random() * window.innerWidth + "px";
            popDiv.style.top = Math.random() * window.innerHeight + "px";
            popDiv.style.fontSize = "28px";
            popDiv.style.zIndex = "10003";
            popDiv.style.pointerEvents = "none";
            popDiv.style.animation = "fadeOutUp 0.8s forwards";
            document.body.appendChild(popDiv);
            setTimeout(() => popDiv.remove(), 800);
        }
    }
    
    function showToastPopup(message, duration = 2000) {
        const toast = document.createElement('div');
        toast.className = 'popup-toast';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => { if(toast) toast.remove(); }, duration);
    }
    
    // منع النقر بزر الفأرة الأيمن لزيادة الغموض
    window.addEventListener('load', () => {
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        console.log("%c⚠️ RESTRICTED ZONE - NO HINTS ⚠️", "color: red; font-size: 16px");
    });
    
    // إضافة pulse keyframe
    const styleSheet = document.createElement("style");
    styleSheet.textContent = `@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); box-shadow: 0 0 12px #ff77aa;} 100% { transform: scale(1); } }`;
    document.head.appendChild(styleSheet);
    
    // السماح بإدخال الأرقام فقط في الحقول
    [codeField1, codeField2, codeField3].forEach(input => {
        input.addEventListener('keypress', function(e) {
            const charCode = e.which ? e.which : e.keyCode;
            if (charCode < 48 || charCode > 57) {
                e.preventDefault();
            }
        });
    });
    
    // تحديد طول الحقول
    codeField1.addEventListener('input', function() {
        if (this.value.length > 4) this.value = this.value.slice(0, 4);
    });
    
    codeField2.addEventListener('input', function() {
        if (this.value.length > 2) this.value = this.value.slice(0, 2);
    });
    
    codeField3.addEventListener('input', function() {
        if (this.value.length > 2) this.value = this.value.slice(0, 2);
    });
</script>
</body>
