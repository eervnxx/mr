<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>الهدية السرية | مريام</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #0a0f1a 0%, #030507 100%);
            font-family: 'Courier New', 'Fira Code', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            cursor: crosshair;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(255, 0, 40, 0.08) 0px, rgba(255, 0, 40, 0.08) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 1;
            animation: glitchScan 6s infinite;
        }

        @keyframes glitchScan {
            0% { opacity: 0.3; }
            50% { opacity: 0.7; }
            100% { opacity: 0.3; }
        }

        .screen {
            position: relative;
            width: 90%;
            max-width: 550px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid #a00;
            box-shadow: 0 0 30px rgba(220, 20, 60, 0.6), inset 0 0 15px rgba(255, 0, 0, 0.2);
            border-radius: 24px;
            padding: 2rem 1.8rem;
            transition: all 0.3s ease;
            z-index: 20;
            margin: 20px;
        }

        .login-container {
            text-align: center;
        }

        .glitch-title {
            font-size: 2rem;
            font-weight: bold;
            color: #d00;
            text-shadow: 2px 2px 0px #4a0000, -2px -2px 0px #ff4444;
            letter-spacing: 3px;
            animation: textFlicker 2.5s infinite;
            margin-bottom: 20px;
        }

        @keyframes textFlicker {
            0% { opacity: 1; text-shadow: 2px 2px 0px #4a0000; }
            85% { opacity: 1; text-shadow: 2px 2px 0px #4a0000; }
            90% { opacity: 0.6; text-shadow: -2px -2px 0px #ff6666; }
            95% { opacity: 1; text-shadow: 3px 0px 0px #8b0000; }
            100% { opacity: 1; text-shadow: 2px 2px 0px #4a0000; }
        }

        .warning-text {
            color: #aa2222;
            font-size: 0.8rem;
            background: #110000aa;
            padding: 8px;
            border-left: 4px solid red;
            margin-bottom: 25px;
            font-family: monospace;
        }

        /* الحقول المنفصلة للتاريخ */
        .date-fields {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .date-field {
            flex: 1;
            min-width: 80px;
        }

        .date-field label {
            display: block;
            color: #aa5555;
            font-size: 0.7rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .date-field input, .date-field select {
            width: 100%;
            background: #0a0505;
            border: 2px solid #a22;
            color: #ff9999;
            padding: 12px 8px;
            font-size: 1.1rem;
            text-align: center;
            font-family: monospace;
            outline: none;
            border-radius: 12px;
            font-weight: bold;
        }

        .date-field input:focus, .date-field select:focus {
            border-color: #ff4444;
            box-shadow: 0 0 12px #ff0000;
            background: #1a0505;
        }

        .enter-btn {
            background: #2c0000;
            border: 1px solid #b33;
            color: #ff7777;
            padding: 12px 25px;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 40px;
            width: 80%;
            letter-spacing: 2px;
        }

        .enter-btn:hover {
            background: #5e0000;
            box-shadow: 0 0 10px crimson;
            color: white;
            border-color: red;
            transform: scale(0.97);
        }

        .error-msg {
            color: #ff5555;
            background: #2a0000aa;
            padding: 8px;
            margin-top: 15px;
            font-size: 0.8rem;
            border-radius: 8px;
            font-weight: bold;
        }

        .second-screen, .final-screen {
            display: none;
        }

        .question-box {
            text-align: center;
            margin: 15px 0;
        }

        .punch-btn {
            background: #1f1a1a;
            border: 2px dotted #ff4d4d;
            color: #ffb3b3;
            padding: 14px 28px;
            margin: 12px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            transition: 0.1s linear;
            border-radius: 40px;
            width: 70%;
            box-shadow: inset 0 0 8px #660000, 0 4px 8px black;
        }

        .punch-btn:active {
            transform: scale(0.96);
            background: #4a0000;
            border-style: solid;
        }

        .punch-btn:hover {
            background: #3a1010;
            border-color: red;
            color: white;
            letter-spacing: 1px;
        }

        .hidden-sub {
            display: none;
            margin-top: 20px;
        }

        .fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .typewriter-text {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            background: #0c0c0c;
            padding: 20px;
            border-left: 5px solid #c33;
            color: #e0e0e0;
            direction: ltr;
            text-align: left;
            white-space: pre-wrap;
            font-weight: bold;
            border-radius: 12px;
            line-height: 1.5;
            box-shadow: inset 0 0 18px #1a0000;
        }

        .final-message {
            margin: 20px 0;
        }

        footer {
            font-size: 10px;
            color: #6a1a1a;
            text-align: center;
            margin-top: 25px;
            opacity: 0.6;
        }

        @media (max-width: 550px) {
            .screen { padding: 1.2rem; }
            .punch-btn { width: 85%; font-size: 1rem; }
            .glitch-title { font-size: 1.5rem; }
            .date-fields { gap: 6px; }
            .date-field input, .date-field select { padding: 8px 4px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<canvas id="fireworksCanvas" class="fireworks-canvas" style="position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 200;"></canvas>

<!-- الشاشة الأولى: تسجيل الدخول بحقول منفصلة (سنة، شهر، يوم) -->
<div id="loginScreen" class="screen login-container">
    <div class="glitch-title">[ ACCESS_GRANTED? ]</div>
    <div class="warning-text">⚠ نظام ابتزاز آمن • مستوى الاختراق: DARKNET ⚠</div>
    <div class="warning-text" style="font-size:0.7rem;">► أدخل الرمز الزمني السري (منفصل) ◄</div>
    
    <div class="date-fields">
        <div class="date-field">
            <label>█████</label>
            <input type="text" id="yearInput" maxlength="4" placeholder="السنة" autocomplete="off">
        </div>
        <div class="date-field">
            <label>███</label>
            <input type="text" id="monthInput" maxlength="2" placeholder="الشهر" autocomplete="off">
        </div>
        <div class="date-field">
            <label>███</label>
            <input type="text" id="dayInput" maxlength="2" placeholder="اليوم" autocomplete="off">
        </div>
    </div>
    
    <button id="submitLoginBtn" class="enter-btn">⌧ فك القفل ⌧</button>
    <div id="loginError" class="error-msg"></div>
    <footer>تحذير: محاولة اختراق سيتم رصدها</footer>
</div>

<!-- الشاشة الثانية: الأزرار المنثقبة -->
<div id="secondScreen" class="screen second-screen">
    <div class="glitch-title" style="font-size: 1.8rem;">[ ENCRYPTED_ZONE ]</div>
    <div class="question-box">
        <button id="yesMiriamBtn" class="punch-btn">● هل انت مريام؟ ●</button>
        <div id="subQuestion" class="hidden-sub">
            <button id="yesMaysanBtn" class="punch-btn" style="background:#2a0f0f;">🔘 هل انت من ميسان؟ 🔘</button>
        </div>
    </div>
    <footer style="margin-top:20px;">أزرار مثقوبة .. اختر بحذر</footer>
</div>

<!-- الشاشة الثالثة والأخيرة -->
<div id="finalScreen" class="screen final-screen">
    <div class="glitch-title" style="font-size: 1.5rem;">[ MESSAGE_DECODED ]</div>
    <div class="final-message">
        <div id="typewriterContainer" class="typewriter-text"></div>
    </div>
    <footer>♥ هدية خاصة ♥</footer>
</div>

<script>
    (function() {
        // القيم الصحيحة للتاريخ (كل جزء منفصل)
        const CORRECT_YEAR = "2006";
        const CORRECT_MONTH = "5";
        const CORRECT_DAY = "17";
        
        const loginScreen = document.getElementById('loginScreen');
        const secondScreen = document.getElementById('secondScreen');
        const finalScreen = document.getElementById('finalScreen');
        
        const yearInput = document.getElementById('yearInput');
        const monthInput = document.getElementById('monthInput');
        const dayInput = document.getElementById('dayInput');
        const loginBtn = document.getElementById('submitLoginBtn');
        const loginErrorDiv = document.getElementById('loginError');
        
        const yesMiriamBtn = document.getElementById('yesMiriamBtn');
        const subQuestionDiv = document.getElementById('subQuestion');
        const yesMaysanBtn = document.getElementById('yesMaysanBtn');
        
        let canvas = document.getElementById('fireworksCanvas');
        let ctx = canvas.getContext('2d');
        let particles = [];
        let animationId = null;
        let fireworksActive = false;
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
            if(fireworksActive) drawFireworksLoop();
        });
        resizeCanvas();
        
        class Particle {
            constructor(x, y, vx, vy, color, size, life, isFire = true) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.color = color; this.size = size; this.life = life; this.initialLife = life;
                this.gravity = 0.2; this.friction = 0.98; this.isFire = isFire;
            }
            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 1;
            }
            draw(ctx) {
                let alpha = Math.min(1, this.life / this.initialLife);
                ctx.globalAlpha = alpha * 0.9;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                if(this.isFire && Math.random() > 0.7) {
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = "orange";
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        }
        
        function createExplosion(centerX, centerY, isBig = true) {
            let count = isBig ? 55 : 30;
            let colors = ['#ff3300', '#ffaa00', '#ff6600', '#ffcc33', '#ff4444', '#ff8800', '#ff5500', '#ff3366'];
            for(let i=0; i<count; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = (Math.random() * 4 + 2) * (isBig ? 1.3 : 0.9);
                let vx = Math.cos(angle) * speed * (Math.random() * 1.5);
                let vy = Math.sin(angle) * speed * (Math.random() * 1.5);
                let color = colors[Math.floor(Math.random() * colors.length)];
                let size = Math.random() * 3 + 2;
                let life = 50 + Math.random() * 30;
                particles.push(new Particle(centerX, centerY, vx, vy, color, size, life, true));
            }
            for(let i=0;i<15;i++) {
                let angle2 = Math.random() * Math.PI * 2;
                let spd = Math.random() * 5;
                let vx2 = Math.cos(angle2) * spd;
                let vy2 = Math.sin(angle2) * spd;
                particles.push(new Particle(centerX, centerY, vx2, vy2, '#ffaa66', Math.random()*2+1, 35+Math.random()*20, false));
            }
        }
        
        function spawnRandomFirework() {
            if(!fireworksActive) return;
            let x = Math.random() * canvas.width;
            let y = Math.random() * canvas.height * 0.6 + 50;
            createExplosion(x, y, true);
            setTimeout(() => {
                if(fireworksActive) createExplosion(x + (Math.random()-0.5)*80, y + (Math.random()-0.5)*60, false);
            }, 100);
        }
        
        function startFireworksAndCrackers(durationSec = 8) {
            if(fireworksActive) return;
            fireworksActive = true;
            particles = [];
            let fireInterval = setInterval(() => {
                if(!fireworksActive) {
                    clearInterval(fireInterval);
                    return;
                }
                spawnRandomFirework();
                if(Math.random() > 0.6) {
                    setTimeout(() => {
                        if(fireworksActive) {
                            let x2 = Math.random() * canvas.width;
                            let y2 = Math.random() * canvas.height * 0.7;
                            createExplosion(x2, y2, false);
                        }
                    }, 100);
                }
            }, 600);
            
            function drawLoop() {
                if(!ctx) return;
                if(!fireworksActive && particles.length === 0) {
                    if(animationId) cancelAnimationFrame(animationId);
                    animationId = null;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    return;
                }
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for(let i=0; i<particles.length; i++) {
                    particles[i].update();
                    particles[i].draw(ctx);
                    if(particles[i].life <= 0) {
                        particles.splice(i,1);
                        i--;
                    }
                }
                if(fireworksActive || particles.length > 0) {
                    animationId = requestAnimationFrame(drawLoop);
                } else {
                    if(animationId) cancelAnimationFrame(animationId);
                    animationId = null;
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                }
            }
            if(animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(drawLoop);
            
            setTimeout(() => {
                if(fireworksActive) {
                    for(let i=0;i<8;i++) {
                        setTimeout(() => {
                            if(fireworksActive) {
                                let randX = Math.random() * canvas.width;
                                let randY = Math.random() * canvas.height * 0.8;
                                createExplosion(randX, randY, false);
                            }
                        }, i*120);
                    }
                    setTimeout(() => {
                        fireworksActive = false;
                        setTimeout(() => {
                            if(particles.length === 0 && animationId) {
                                cancelAnimationFrame(animationId);
                                animationId = null;
                                ctx.clearRect(0,0,canvas.width,canvas.height);
                            }
                        }, 1500);
                    }, durationSec * 1000);
                }
            }, 100);
        }
        
        function showLogin() {
            loginScreen.style.display = "block";
            secondScreen.style.display = "none";
            finalScreen.style.display = "none";
            loginErrorDiv.innerText = "";
            yearInput.value = "";
            monthInput.value = "";
            dayInput.value = "";
            if(fireworksActive) fireworksActive = false;
        }
        
        function showSecond() {
            loginScreen.style.display = "none";
            secondScreen.style.display = "block";
            finalScreen.style.display = "none";
            subQuestionDiv.classList.add('hidden-sub');
            yesMiriamBtn.disabled = false;
            yesMiriamBtn.style.opacity = "1";
            yesMiriamBtn.style.textDecoration = "none";
            yesMiriamBtn.innerText = "● هل انت مريام؟ ●";
            if(yesMaysanBtn) yesMaysanBtn.disabled = false;
            yesMaysanBtn.style.opacity = "1";
            yesMaysanBtn.innerText = "🔘 هل انت من ميسان؟ 🔘";
        }
        
        function showFinalAndTypewriter() {
            loginScreen.style.display = "none";
            secondScreen.style.display = "none";
            finalScreen.style.display = "block";
            startFireworksAndCrackers(9);
            const fullText = "لقد تم تصميم هذا الموقع خصيصا لك يا مريام لأنك اصبحت صديقة ذلك الشخص.";
            const container = document.getElementById('typewriterContainer');
            container.innerHTML = "";
            let index = 0;
            function typeNext() {
                if(index < fullText.length) {
                    container.innerHTML += fullText.charAt(index);
                    index++;
                    setTimeout(typeNext, 85);
                } else {
                    let cursorSpan = document.createElement("span");
                    cursorSpan.style.animation = "blink 1s infinite";
                    cursorSpan.innerText = "▌";
                    container.appendChild(cursorSpan);
                }
            }
            typeNext();
            const styleBlink = document.createElement('style');
            styleBlink.innerHTML = `@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }`;
            if(!document.getElementById('blinkAnimStyle')) {
                styleBlink.id = 'blinkAnimStyle';
                document.head.appendChild(styleBlink);
            }
        }
        
        // التحقق من صحة التاريخ (ثلاثة حقول منفصلة)
        function checkDate() {
            let year = yearInput.value.trim();
            let month = monthInput.value.trim();
            let day = dayInput.value.trim();
            
            if(year === CORRECT_YEAR && month === CORRECT_MONTH && day === CORRECT_DAY) {
                loginErrorDiv.innerText = "";
                showSecond();
            } else {
                loginErrorDiv.innerText = "✘ رمز زمني خاطئ ✘\nالوصول مرفوض";
                [yearInput, monthInput, dayInput].forEach(inp => {
                    inp.style.borderColor = "#ff0000";
                    setTimeout(() => inp.style.borderColor = "#a22", 500);
                });
                loginScreen.style.transform = "translateX(4px)";
                setTimeout(() => loginScreen.style.transform = "translateX(-4px)", 60);
                setTimeout(() => loginScreen.style.transform = "translateX(0)", 120);
            }
        }
        
        loginBtn.addEventListener('click', checkDate);
        
        [yearInput, monthInput, dayInput].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if(e.key === 'Enter') checkDate();
            });
        });
        
        yesMiriamBtn.addEventListener('click', () => {
            subQuestionDiv.classList.remove('hidden-sub');
            yesMiriamBtn.disabled = true;
            yesMiriamBtn.style.opacity = "0.7";
            yesMiriamBtn.style.textDecoration = "line-through";
            yesMiriamBtn.innerText = "✓ تم التأكيد: مريام ✓";
            secondScreen.style.transform = "scale(0.99)";
            setTimeout(() => secondScreen.style.transform = "", 120);
        });
        
        yesMaysanBtn.addEventListener('click', () => {
            if(!yesMaysanBtn.disabled) {
                startFireworksAndCrackers(6);
                if(canvas) {
                    let centerX = canvas.width/2;
                    let centerY = canvas.height/2;
                    createExplosion(centerX, centerY, true);
                    setTimeout(() => {
                        if(canvas) createExplosion(centerX+50, centerY-30, true);
                    }, 150);
                }
                yesMaysanBtn.disabled = true;
                yesMaysanBtn.style.opacity = "0.6";
                yesMaysanBtn.style.borderStyle = "solid";
                yesMaysanBtn.innerText = "✔ تأكيد ميسان ✔";
                setTimeout(() => {
                    showFinalAndTypewriter();
                }, 1300);
            }
        });
        
        showLogin();
        
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            if(e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
                alert("⚠️ تم حظر أدوات المطور ⚠️");
            }
        });
        
        setInterval(() => {
            if(loginScreen.style.display !== "none") {
                let glow = Math.random() * 12 + 6;
                loginScreen.style.boxShadow = `0 0 ${glow}px rgba(200,0,0,0.7)`;
                setTimeout(() => {
                    if(loginScreen.style.display !== "none") loginScreen.style.boxShadow = "0 0 30px rgba(220,20,60,0.6)";
                }, 200);
            } else if(secondScreen.style.display !== "none") {
                secondScreen.style.boxShadow = `0 0 ${Math.random()*10+10}px #a22`;
                setTimeout(() => secondScreen.style.boxShadow = "0 0 30px rgba(220,20,60,0.6)", 150);
            } else if(finalScreen.style.display !== "none") {
                finalScreen.style.boxShadow = `0 0 ${Math.random()*12+8}px #ff6666`;
            }
        }, 2000);
    })();
</script>
</body>
</html>
